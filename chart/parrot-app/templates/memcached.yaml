{{- if .Values.hpaBench.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-memcached
  labels:
    app.kubernetes.io/name: memcached
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memcached
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memcached
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: memcached
          image: docker.io/library/memcached:1.6-alpine
          args:
            - "-m"
            - "{{ .Values.memcached.memoryLimitMB }}"
          ports:
            - name: memcache
              containerPort: 11211
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: {{ add .Values.memcached.memoryLimitMB 16 }}Mi
            limits:
              cpu: 100m
              memory: {{ add .Values.memcached.memoryLimitMB 16 }}Mi
          livenessProbe:
            tcpSocket:
              port: memcache
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-memcached
  labels:
    app.kubernetes.io/name: memcached
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: memcached
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: memcache
      port: 11211
      targetPort: memcache
      protocol: TCP
{{- end }}
