name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/cyberbugjr/k8s-parrot-app:latest

      - name: Lint Helm chart
        run: helm lint chart/parrot-app

      - name: Package Helm chart
        run: |
          helm package chart/parrot-app
          echo "CHART_PACKAGE=$(ls parrot-app-*.tgz)" >> "$GITHUB_ENV"

      - name: Push Helm chart to GHCR
        if: github.event_name == 'push'
        run: |
          helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }}
          helm push "$CHART_PACKAGE" oci://ghcr.io/cyberbugjr/charts
