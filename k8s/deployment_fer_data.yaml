apiVersion: apps/v1
kind: Deployment
metadata:
  name: data
spec:
  selector:
    matchLabels:
      app: data
  template:
    metadata:
      labels:
        app: data
    spec:
      containers:
      - name: data
        image: busybox:latest
        resources:
          requests:
            memory: 50Mi
            cpu: 100m
          limits:
            memory: 50Mi
            cpu: 100m
        volumeMounts:
        - name: fer-data
          mountPath: /data
      volumes:
      - name: fer-data
        persistentVolumeClaim:
          claimName: fer-data-pvc
